<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LAKKA | Atölyeden Yaşam Alanınıza</title>
    <base href="/" />

    <!-- Google Fonts: Cormorant Garamond (lüks serif) + Inter (modern sans) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

    <!-- MudBlazor Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />

    <!-- MudBlazor CSS -->
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />

    <!-- LAKKA Global CSS -->
    <link href="css/app.css?v=9" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:'Cormorant Garamond',serif;letter-spacing:8px;font-size:28px;color:#2C2C2C;">LAKKA</div>
    </div>

    <div id="blazor-error-ui">
        Beklenmeyen bir hata oluştu.
        <a href="" class="reload">Yenile</a>
        <a class="dismiss">&#x2715;</a>
    </div>

    <!-- Eski/önbellekteki service worker'ları temizle (geliştirme sırasında "Loading..." takılmasını önler) -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function (regs) {
                for (var i = 0; i < regs.length; i++) { regs[i].unregister(); }
            });
            if (window.caches && caches.keys) {
                caches.keys().then(function (keys) {
                    keys.forEach(function (k) { caches.delete(k); });
                });
            }
        }
    </script>

    <!-- Scroll edildiğinde üst menüyü gizle, tepeye dönünce göster -->
    <script>
        (function () {
            var ticking = false;
            function update() {
                if (window.scrollY > 0) {
                    document.body.classList.add('is-scrolled');
                } else {
                    document.body.classList.remove('is-scrolled');
                }
                ticking = false;
            }
            window.addEventListener('scroll', function () {
                if (!ticking) {
                    window.requestAnimationFrame(update);
                    ticking = true;
                }
            }, { passive: true });
        })();
    </script>

    <!-- Blazor WebAssembly runtime -->
    <script src="_framework/blazor.webassembly.js"></script>

    <!-- MudBlazor JS (blazor.webassembly.js'den SONRA yüklenmelidir) -->
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
</body>

</html>
